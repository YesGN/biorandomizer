<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bio Randomizer 🧬</title>

<link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Mali',sans-serif;
    min-height:100vh;

    background:linear-gradient(
        135deg,
        #ffd6e7,
        #d6f0ff
    );

    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    text-align:center;
    width:90%;
    max-width:700px;
}

h1{
    color:#444;
    margin-bottom:20px;
    font-size:2.5rem;
}

.subtitle{
    color:#666;
    margin-bottom:30px;
}

button{

    background:#ff8fb1;
    color:white;

    border:none;

    padding:18px 45px;

    border-radius:999px;

    font-size:1.2rem;
    font-weight:bold;

    cursor:pointer;

    transition:.3s;

    box-shadow:
        0 8px 20px rgba(0,0,0,.15);
}

button:hover{
    transform:scale(1.08);
}

.card{

    background:white;

    margin-top:35px;

    padding:35px;

    border-radius:30px;

    box-shadow:
        0 10px 30px rgba(0,0,0,.12);

    min-height:150px;

    display:flex;
    align-items:center;
    justify-content:center;
}

#result{
    font-size:1.7rem;
    font-weight:bold;
    color:#444;
}

.shuffle{
    animation:shake .08s linear infinite;
}

@keyframes shake{
    0%{transform:translateX(-4px);}
    50%{transform:translateX(4px);}
    100%{transform:translateX(-4px);}
}

.pop{
    animation:pop .5s ease;
}

@keyframes pop{
    0%{
        transform:scale(.5);
        opacity:0;
    }

    100%{
        transform:scale(1);
        opacity:1;
    }
}

.sparkle{
    font-size:1.3rem;
}

</style>
</head>

<body>

<div class="container">

<h1>🧬 Bio Randomizer</h1>

<p class="subtitle">
สุ่มหัวข้อชีววิทยา สสวท. เพื่ออ่านหนังสือ
</p>

<button onclick="randomTopic()">
🎲 สุ่มบทเรียน
</button>

<div class="card">
    <div id="result">
        กดปุ่มเพื่อเริ่มสุ่ม ✨
    </div>
</div>

</div>

<script>

const topics = [

"เคมีที่เป็นพื้นฐานของสิ่งมีชีวิต",
"น้ำ",
"คาร์โบไฮเดรต",
"โปรตีน",
"ลิพิด",
"กรดนิวคลีอิก",

"เซลล์",
"เยื่อหุ้มเซลล์",
"ออร์แกเนลล์",
"การลำเลียงสารผ่านเซลล์",

"การหายใจระดับเซลล์",
"การสังเคราะห์ด้วยแสง",

"วัฏจักรเซลล์",
"ไมโทซิส",
"ไมโอซิส",

"พันธุศาสตร์เมนเดล",
"การถ่ายทอดลักษณะทางพันธุกรรม",

"DNA",
"การจำลอง DNA",
"RNA",
"การสังเคราะห์โปรตีน",

"เทคโนโลยี DNA",

"วิวัฒนาการ",
"การคัดเลือกโดยธรรมชาติ",

"ความหลากหลายทางชีวภาพ",
"แบคทีเรีย",
"โพรทิสต์",
"ฟังไจ",
"พืช",
"สัตว์",

"เนื้อเยื่อพืช",
"การลำเลียงในพืช",
"การคายน้ำ",
"ฮอร์โมนพืช",

"ระบบย่อยอาหาร",
"ระบบหายใจ",
"ระบบหมุนเวียนเลือด",
"ระบบน้ำเหลือง",
"ระบบขับถ่าย",

"ระบบประสาท",
"สมอง",
"ไขสันหลัง",
"อวัยวะรับความรู้สึก",

"ระบบต่อมไร้ท่อ",
"ฮอร์โมน",

"ภูมิคุ้มกัน",

"ระบบสืบพันธุ์",

"พฤติกรรมสัตว์",

"นิเวศวิทยา",
"ประชากร",
"ชุมชน",
"ระบบนิเวศ",

"การถ่ายทอดพลังงาน",
"ห่วงโซ่อาหาร",
"สายใยอาหาร",

"วัฏจักรคาร์บอน",
"วัฏจักรไนโตรเจน",
"วัฏจักรน้ำ",

"การเปลี่ยนแปลงแทนที่",
"ทรัพยากรธรรมชาติ",
"สิ่งแวดล้อม"

];

const result =
document.getElementById("result");

function playSound(){

    const ctx =
    new (window.AudioContext ||
    window.webkitAudioContext)();

    const osc =
    ctx.createOscillator();

    const gain =
    ctx.createGain();

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.type = "triangle";

    osc.frequency.value = 800;

    gain.gain.value = 0.08;

    osc.start();

    osc.frequency.exponentialRampToValueAtTime(
        1200,
        ctx.currentTime + 0.15
    );

    osc.stop(
        ctx.currentTime + 0.18
    );
}

function randomTopic(){

    result.classList.add("shuffle");

    let count = 0;

    const interval =
    setInterval(()=>{

        result.innerHTML =
        "🔬 " +
        topics[
        Math.floor(
        Math.random()*
        topics.length
        )];

        count++;

        if(count>=25){

            clearInterval(interval);

            const finalTopic =
            topics[
            Math.floor(
            Math.random()*
            topics.length
            )];

            result.classList.remove("shuffle");

            result.classList.add("pop");

            result.innerHTML =
            "✨🧬<br><br>" +
            finalTopic;

            playSound();

            setTimeout(()=>{
                result.classList.remove("pop");
            },500);
        }

    },80);
}

</script>

</body>
</html>
